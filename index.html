jhv<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics AI Tutor</title>

<link rel="stylesheet" href="style.css">

<!-- OCR库（备用） -->
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

</head>

<body>

<header>
    <h1>🔬 Physics AI Tutor</h1>
    <p>物理题目解析 + 错题本系统</p>
</header>

<main>

<!-- 输入区 -->
<section class="box">

    <h2>输入题目</h2>

    <textarea id="questionInput" placeholder="请输入物理题目..."></textarea>

    <input type="file" id="imageInput" accept="image/*">

    <br><br>

    <button id="analyzeBtn">开始分析</button>
    <button id="saveBtn">⭐ 加入错题本</button>

</section>

<!-- 解析结果 -->
<section class="box">

    <h2>解析结果</h2>

    <div class="card">
        <h3>题目类型</h3>
        <p id="type">-</p>
    </div>

    <div class="card">
        <h3>知识点</h3>
        <p id="knowledge">-</p>
    </div>

    <div class="card">
        <h3>中文解析</h3>
        <p id="cn">-</p>
    </div>

    <div class="card">
        <h3>English</h3>
        <p id="en">-</p>
    </div>

    <div class="card">
        <h3>历史知识</h3>
        <p id="history">-</p>
    </div>

</section>

<!-- 错题本 -->
<button id="clearNotebookBtn">🗑 清空错题本</button>
<section class="box">

    <h2>📚 错题本 Notebook</h2>
    <input
    type="text"
    id="searchInput"
    placeholder="搜索错题..."
    >

    <div id="notebookList"></div>

</section>

</main>

<footer>
<p>Physics AI Tutor © 2026</p>
</footer>

<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="config.js"></script>
<script src="script.js"></script>

</body>
<p>
<span class="category">
div.innerHTML = `
    </p>${item.category}</p>
`;
</span>
    <h2>📊 分类统计</h2>
    <canvas id="categoryChart"></canvas>
</p>

</html>
